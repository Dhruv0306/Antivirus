# Local profile for persistent development data.
# Activate with SPRING_PROFILES_ACTIVE=local.
spring.config.import=optional:file:.env.local[.properties]

spring.flyway.enabled=true

spring.datasource.url=jdbc:h2:file:./data/antivirus_local;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=localh2password

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
logging.level.com.antivirus=DEBUG

# CORS: the SecurityConfig fail-fast guard rejects any origin containing
# the string "localhost" under every profile except "dev". 127.0.0.1 is
# functionally identical for local use but doesn't trip that check, so
# local can actually boot the full app, not just run Flyway against the
# file DB. Override via .env.local if you need something else.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5000,http://127.0.0.1:3000,http://127.0.0.1:5173}

# Match the shared defaults so local development behaves the same as the
# main profile unless explicitly overridden.
app.domain-blocking.dns.enabled=${DNS_BLOCKING_ENABLED:false}
app.quarantine.dir=${QUARANTINE_DIR:${user.dir}/quarantine}

# How many system-scan results to keep in memory before flushing them to a
# unique chunk file. Set via .env as SYSTEM_SCAN_RESULT_CHUNK_SIZE.
app.scan.system.result-chunk-size=${SYSTEM_SCAN_RESULT_CHUNK_SIZE:100}  