# Local profile for persistent development data.
# Activate with SPRING_PROFILES_ACTIVE=local.

spring.datasource.url=jdbc:h2:file:./data/antivirus_local;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.show-sql=true
logging.level.com.antivirus=DEBUG
