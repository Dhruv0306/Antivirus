# Server Configuration
server.port=${SERVER_PORT:8080}
spring.config.import=optional:file:.env.dev[.properties]

# Database Configuration (local default is an in-memory H2 database)
spring.datasource.url=${DB_URL:jdbc:h2:mem:antivirus_v3;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
# Default local H2 uses an empty password; dev/prod profiles can override this.
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.settings.web-allow-others=${H2_CONSOLE_WEB_ALLOW_OTHERS:false}
spring.h2.console.path=${H2_CONSOLE_PATH:/h2-console}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

# F-03: Disable Flyway in dev; Hibernate ddl-auto=update handles schema for speed
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# File Upload Configuration
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:1000MB}
spring.servlet.multipart.enabled=${MULTIPART_ENABLED:true}
spring.servlet.multipart.file-size-threshold=${MULTIPART_FILE_SIZE_THRESHOLD:2KB}
server.tomcat.max-part-count=${TOMCAT_MAX_PART_COUNT:500}

# Admin credentials must be supplied explicitly
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# Logging Configuration
logging.level.com.antivirus=${LOG_LEVEL_COM_ANTIVIRUS:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:INFO}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:3000,http://localhost:5173}
spring.mvc.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
spring.mvc.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With}
spring.mvc.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}
spring.mvc.cors.max-age=${CORS_MAX_AGE:3600}

# Scan limits
app.scan.max-files-per-directory-upload=${APP_SCAN_MAX_FILES_PER_DIRECTORY_UPLOAD:500}

# H3: Keep the same explicit defaults as the base profile so dev runs
# behave consistently unless overridden by environment variables.
app.domain-blocking.dns.enabled=${DNS_BLOCKING_ENABLED:false}
app.quarantine.dir=${QUARANTINE_DIR:${user.dir}/quarantine}

# Trusted Proxy Configuration (for Rate Limiting)
# Comma-separated list of trusted reverse proxy/load balancer IPs.
# If the app is not behind a load balancer, leave this empty to prevent X-Forwarded-For spoofing.
app.trusted-proxy-ips=${TRUSTED_PROXY_IPS:}

# Ensure session cookie is sent cross-port on the same IP
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:lax}
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.path=${SESSION_COOKIE_PATH:/}

# How many system-scan results to keep in memory before flushing them to a
# unique chunk file. Set via .env.dev as SYSTEM_SCAN_RESULT_CHUNK_SIZE.
app.scan.system.result-chunk-size=${SYSTEM_SCAN_RESULT_CHUNK_SIZE:100}
