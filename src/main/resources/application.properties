# Server Configuration
server.port=8080
spring.config.import=optional:file:.env[.properties]

# Database Configuration (local default is an in-memory H2 database)
spring.datasource.url=${DB_URL:jdbc:h2:mem:antivirus_v3;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
# Default local H2 uses an empty password; dev/prod profiles can override this.
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# Admin credentials must be supplied explicitly
app.admin.username=${ADMIN_USERNAME}
app.admin.password=${ADMIN_PASSWORD}

# Logging Configuration
logging.level.com.antivirus=INFO
logging.level.org.springframework.security=INFO

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:3000,http://localhost:5173}
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

# Scan limits
app.scan.max-files-per-directory-upload=500
# How many system-scan results to keep in memory before flushing them to a
# unique chunk file. Set via .env as SYSTEM_SCAN_RESULT_CHUNK_SIZE.
app.scan.system.result-chunk-size=${SYSTEM_SCAN_RESULT_CHUNK_SIZE:100}

# H3: Quarantine storage. Absolute directory quarantined files are moved
# to. Defaults to a "quarantine" folder under the process working
# directory (matches the previous hardcoded behavior), but should be set
# to a stable, absolute path outside any container's ephemeral or
# read-only layers in production.
# H2: DNS-based domain blocking (dnsmasq) is a privileged path: it rewrites
# a system config file and shells out to `systemctl reload dnsmasq`. It was
# previously reachable on an unconditional 5-minute schedule regardless of
# whether anyone used the feature. Disabled by default; only turn this on
# if you deliberately want DNS-based blocking and have provisioned dnsmasq
# and the required system permissions for it.
app.domain-blocking.dns.enabled=${DNS_BLOCKING_ENABLED:false}

app.quarantine.dir=${QUARANTINE_DIR:${user.dir}/quarantine}

# Trusted Proxy Configuration (for Rate Limiting)
# Comma-separated list of trusted reverse proxy/load balancer IPs.
# If the app is not behind a load balancer, leave this empty to prevent X-Forwarded-For spoofing.
app.trusted-proxy-ips=${TRUSTED_PROXY_IPS:}
