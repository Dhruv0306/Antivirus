# Server Configuration
server.port=8080

# Database Configuration (override via environment variables in production)
spring.datasource.url=${DB_URL:jdbc:h2:file:./antivirus_db}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# Security Configuration (required — set before starting the application)
spring.security.user.name=${ADMIN_USERNAME}
spring.security.user.password=${ADMIN_PASSWORD}

# Logging Configuration
logging.level.com.antivirus=INFO
logging.level.org.springframework.security=INFO

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:3000,http://localhost:5173}
spring.jpa.open-in-view=false
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

# Scan limits
app.scan.max-files-per-directory-upload=500
