name: Frontend Tests with Node.js
on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

jobs:
    test_frontend:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend

        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run frontend tests
              run: npm test

            # Report-only for now (--audit-level=high keeps this to
            # meaningful findings rather than every low-severity transitive
            # advisory, and continue-on-error keeps this from blocking the
            # actual test run above). Once reviewed, drop continue-on-error
            # to make this blocking, the same staged-adoption approach used
            # for the new SpotBugs/Semgrep workflows.
            - name: npm audit
              continue-on-error: true
              run: npm audit --audit-level=high
