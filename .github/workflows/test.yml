name: Java CI test With Maven
on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4 # Updated to v4 for 2026 standards

            - name: Set up JDK 21
              uses: actions/setup-java@v4 # Updated to v4
              with:
                  distribution: "temurin"
                  java-version: "21"
                  cache: "maven" # Speed up builds by caching dependencies

            - name: Run tests with Maven
              run: mvn test