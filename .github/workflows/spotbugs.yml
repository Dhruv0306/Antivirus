name: SpotBugs (Find Security Bugs)
on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]

jobs:
    spotbugs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up JDK 21
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"
                  cache: "maven"

            # SpotBugs needs compiled classes to analyze; the `spotbugs`
            # goal alone doesn't compile first. Same "call the goal
            # directly, don't rely on lifecycle phase binding" lesson as
            # dependency_check.yml: this always runs regardless of what
            # phase build.yml/test_java.yml happen to invoke.
            - name: Compile
              run: mvn -B compile --file pom.xml

            # Report-only (the `spotbugs` goal, not `check`) until findings
            # from this codebase's first run have been triaged. See the
            # comment on the spotbugs-maven-plugin block in pom.xml.
            - name: Run SpotBugs (Find Security Bugs)
              run: mvn -B com.github.spotbugs:spotbugs-maven-plugin:4.9.8.4:spotbugs --file pom.xml

            - name: Upload SpotBugs report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: spotbugs-report
                  path: target/spotbugsXml.xml
                  retention-days: 14
