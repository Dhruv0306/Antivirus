name: Semgrep
on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["main"]

jobs:
    semgrep:
        runs-on: ubuntu-latest
        # Native container image, per Semgrep's current documented setup.
        # The semgrep/semgrep-action wrapper is deprecated as of 2026; do
        # not switch back to it. See https://semgrep.dev/docs/semgrep-ci/sample-ci-configs
        container:
            image: semgrep/semgrep
        steps:
            - uses: actions/checkout@v4

            # Report-only for now (no --error flag): this codebase has
            # never been scanned by Semgrep before, so the current
            # finding count/quality is unknown. Once the first report has
            # been reviewed and any accepted false positives added to a
            # .semgrepignore, add --error here to fail the build on
            # findings, the same staged-adoption approach used for
            # SpotBugs (see pom.xml) and originally for the OWASP
            # dependency-check gate.
            - name: Run Semgrep
              run: semgrep scan --config auto --sarif --output semgrep-results.sarif .

            - name: Upload Semgrep report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: semgrep-report
                  path: semgrep-results.sarif
                  retention-days: 14
